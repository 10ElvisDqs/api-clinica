server {
    listen 80;
    server_name 192.168.100.9;

    # =====================================================
    # Angular SPA — servida desde la imagen del contenedor
    # =====================================================
    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos de Laravel (storage: fotos, PDFs...)
    # El volumen ./api-clinica monta en /var/www/html
    location /storage/ {
        alias /var/www/html/public/storage/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # =====================================================
    # Laravel API — proxy hacia PHP-FPM (contenedor app)
    # =====================================================
    location /api {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # =====================================================
    # Angular SPA — todas las demás rutas
    # =====================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a archivos ocultos
    location ~ /\.ht {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
